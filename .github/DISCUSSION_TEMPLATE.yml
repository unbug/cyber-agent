## 💬 General Question/Discussion

```markdown
**What's your question?**
Be specific about what you're asking.

**Context**
Provide context about where you're stuck or what you're curious about.

**What I've tried**
What have you already tried or researched?

**Additional context**
Any other relevant information.
```

