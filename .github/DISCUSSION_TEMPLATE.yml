## 📢 Announcements

Use this template for official CyberAgent team announcements.

```markdown
**Announcement Title**
Clear, specific title of the announcement.

**What's changing?**
- What is the announcement about?
- When is it happening?
- What are the key dates/timelines?

**Impact on users**
- How does this affect current users?
- Do users need to take any action?
- Will there be any downtime?

**Links**
- Documentation links
- Migration guides
- Related issues/PRs

**Contact info**
Who to reach out to for questions or support.
```

