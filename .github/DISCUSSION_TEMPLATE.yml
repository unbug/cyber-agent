## 🎯 Use-Case Discussion

Share your specific use case or ask how CyberAgent could help.

```markdown
**My Use Case**
- Robot type: [e.g., RoboMaster, DIY robot, educational kit]
- Goal: [What you want to achieve]
- Constraints: [Battery, processing power, etc.]

**Current Status**
What have you tried so far? What's working? What's not?

**What you need help with**
Be specific about what guidance or features you're looking for.

**Any code examples?**
Paste relevant snippets if applicable.
```

---

## 📋 Guidelines

### Before posting:
1. ✅ **Search first** - Make sure your question/topic hasn't been answered
2. ✅ **Use appropriate template** - Helps us categorize and respond faster
3. ✅ **Be respectful** - All community members should feel welcome
4. ✅ **Add tags** - Use labels to make your post discoverable

### After posting:
- 🎯 Update your post if you find the answer
- 👍 Upvote helpful discussions
- 🔖 Bookmark useful threads for future reference
- 🙏 Thank people who helped you!

---

*This template helps us keep discussions organized and find answers faster. Thank you for being a valued member of the CyberAgent community! 🚀*
