# Community Question Template

> Welcome to the CyberAgent community! Please use one of the discussion templates below.

---

## 🐛 Bug Report

**Before submitting**, please search existing issues to avoid duplicates.

```markdown
**Describe the bug**
A clear and concise description of what the bug is.

**To Reproduce**
Steps to reproduce the bug:
1. Navigate to '...'
2. Click on '...'
3. Scroll down to '...'
4. See error

**Expected behavior**
A clear and concise description of what you expected to happen.

**Screenshots**
If applicable, add screenshots to help explain your problem.

**Environment**
- OS: [e.g. macOS, Windows, Linux]
- Browser: [e.g. Chrome, Safari, Firefox]
- CyberAgent version: [e.g. v1.0.0]

**Additional context**
Add any other context about the problem here.
```

---

## 🚀 Feature Request

```markdown
**Describe the feature**
A clear and concise description of what you want to happen.

**Problem it solves**
What problem are you trying to solve? Who would benefit from this feature?

**Proposed solution**
How would you implement this feature? Any ideas or technical thoughts?

**Alternatives considered**
Are there other ways to solve this problem that you've considered?

**Additional context**
Add any other context or screenshots about the feature request here.
```

