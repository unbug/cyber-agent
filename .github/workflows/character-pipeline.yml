name: Character PR Automated Review

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/characters/**'
      - 'src/data/characters.ts'
      - 'src/engine/**'

jobs:
  automated-review:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests
        run: npm test
        
      - name: Build
        run: npm run build
        
      - name: Check character structure
        run: |
          # Check if new characters follow template
          node scripts/validate-characters.js
        
      - name: Comment on PR
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🎉 Automated review passed! ✅\n\n- Tests: All passing\n- Build: Successful\n- Character structure: Valid syntax\n\nReady for human review!'
            })
